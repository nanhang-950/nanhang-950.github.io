<ol start="3">
<li>利用思路</li>
</ol>
<p>利用的关键就在于如何泄露栈帧</p>
<p>而泄露栈帧的关键就在于这个汇编指令</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><code class="hljs plaintext">.text:08048087                 mov     ecx, esp        ; addr<br></code></pre></td></tr></table></figure>

<p>通过将esp的值复制到ecx，然后调用write系统调用将值进行输出即可泄露栈帧。</p>
